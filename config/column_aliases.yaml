# Natural language / LLM column name → registry column name
# Edit this file when new hallucination patterns appear; redeploy Agent Engine once.

global:
  customer_name: account_name
  cust_name: account_name
  fiscal_q: fiscal_quarter
  fiscal_m: fiscal_month_no
  fy_quarter: fiscal_quarter
  region: territory_code

fiscal_calendar:
  start_month: July
  end_month: June
  fiscal_month_no_start: 1
  fiscal_month_no_end: 12
  note: "Full FY is never April–September; Q4 is only Apr–Jun within a FY"

by_table:
  jaybel-dev.jaybel_sales_analytics.dim_sales_customer:
    customer_name: account_name
    customer: account
  jaybel-dev.jaybel_sales_analytics.fact_sales_report:
    territory: territory_code
    region: territory_code
    product_name: description
    product: description
  jaybel-dev.jaybel_sales_analytics.dim_product:
    product: main_group_name
    product_name: main_group_name

# Product vs product group (critical for ranking "best product" questions)
product_semantics:
  product_name_column: fact_sales_report.description
  product_group_column: dim_product.main_group_name
  rules:
    - '"Product", "product name", "best/top product", "best-selling product", "which product" → GROUP BY fact_sales_report.description (filter NULL/blank). JOIN dim_product for main_group_name.'
    - '"Product group", "category", "main group", "Office Supplies", "Furniture" as category → GROUP BY dim_product.main_group_name only.'
    - 'When ranking or listing products by description, always SELECT f.description AS product_name AND p.main_group_name AS product_group.'
    - 'Never answer "top product" with only main_group_name (e.g. Office Supplies is a group, not a product name).'
    - 'item_code is SKU; description is the human-readable product name on the line.'

value_hints:
  territory_code:
    description: "Use territory_code on fact (JAY, FRA, JOK, EXP, NSW) — not APAC or region labels"
    examples:
      - JAY
      - FRA
      - JOK
      - EXP
  fiscal_quarter:
    description: "Use fiscal_quarter on dim_date with fy (Q1–Q4)"
    examples:
      - Q1
      - Q2
      - Q3
      - Q4

metric_columns:
  gp: line_gp_dollar
  gross_profit: line_gp_dollar
  sales: line_sales_ex_gst
  revenue: line_sales_ex_gst
  margin: gp_percent
