few_shot_examples:
- question: Raw row count in staging sales
  sql: SELECT COUNT(*) AS rows FROM `jaybel-dev.jaybel_sales_analytics.stg_sales_report`
    LIMIT 1000
- question: Sample 5 raw sales rows
  sql: SELECT id, account, trans_date, line_sales_ex_gst FROM `jaybel-dev.jaybel_sales_analytics.stg_sales_report`
    LIMIT 5
- question: Distinct fiscal_year values in raw sales
  sql: SELECT DISTINCT fiscal_year FROM `jaybel-dev.jaybel_sales_analytics.stg_sales_report`
    LIMIT 1000
- question: Raw sales for company Jaybel
  sql: SELECT COUNT(*) AS cnt FROM `jaybel-dev.jaybel_sales_analytics.stg_sales_report`
    WHERE company = 'Jaybel' LIMIT 1000
- question: Invoices in raw staging for account ACC001
  sql: SELECT invoice, trans_date FROM `jaybel-dev.jaybel_sales_analytics.stg_sales_report`
    WHERE account = 'ACC001' LIMIT 1000
- question: Raw file_id traceability list
  sql: SELECT DISTINCT file_id FROM `jaybel-dev.jaybel_sales_analytics.stg_sales_report`
    LIMIT 1000
- question: Raw rep codes distinct
  sql: SELECT DISTINCT rep FROM `jaybel-dev.jaybel_sales_analytics.stg_sales_report`
    LIMIT 1000
- question: Raw territory codes
  sql: SELECT DISTINCT ter FROM `jaybel-dev.jaybel_sales_analytics.stg_sales_report`
    LIMIT 1000
- question: Embroidery or custom printing jobs this week
  sql: SELECT account_name, item_code, description, trans_date, qty, line_sales_ex_gst
    FROM `jaybel-dev.jaybel_sales_analytics.stg_sales_report`
    WHERE COALESCE(
        SAFE.PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', trans_date),
        SAFE.PARSE_TIMESTAMP('%Y-%m-%d', trans_date)
      ) >= TIMESTAMP_TRUNC(CURRENT_TIMESTAMP(), WEEK(MONDAY), 'Australia/Sydney')
      AND COALESCE(
        SAFE.PARSE_TIMESTAMP('%Y-%m-%d %H:%M:%S', trans_date),
        SAFE.PARSE_TIMESTAMP('%Y-%m-%d', trans_date)
      ) < TIMESTAMP_TRUNC(TIMESTAMP_ADD(CURRENT_TIMESTAMP(), INTERVAL 7 DAY), WEEK(MONDAY), 'Australia/Sydney')
      AND (LOWER(description) LIKE '%embroid%'
        OR LOWER(description) LIKE '%custom print%'
        OR LOWER(description) LIKE '%custom printing%'
        OR LOWER(description) LIKE '%screen print%')
    ORDER BY trans_date DESC
    LIMIT 1000
