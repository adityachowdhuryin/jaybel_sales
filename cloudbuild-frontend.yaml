steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile
      - -t
      - ${_IMAGE}
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=${_API_URL}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=${_FB_KEY}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FB_DOMAIN}
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FB_PROJECT}
      - --build-arg
      - NEXT_PUBLIC_GCP_PROJECT_ID=${_GCP_PROJECT}
      - --build-arg
      - NEXT_PUBLIC_GCP_LOCATION=${_GCP_LOCATION}
      - --build-arg
      - NEXT_PUBLIC_AUTH_DISABLED=${_AUTH_DISABLED}
      - .
    dir: frontend
images:
  - ${_IMAGE}
